services:
  - type: web
    name: ai-car-sales-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ai-car-sales-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL_PROVIDER
        value: groq
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile

databases:
  - name: ai-car-sales-db
    plan: free